name: Release dispatch

# Fires repository_dispatch events to every registered consumer-site repo when
# a new engine version is tagged. Each consumer site's blog-build.yml then
# rebuilds and publishes its own dist tarball, which the host's
# shipwreck-updater.php cron picks up.
#
# Required secret: SHIPWRECK_DISPATCH_PAT
#   A GitHub PAT with `repo` scope (private) or `public_repo` (public) that has
#   write access to every repo listed in .shipwreck/sites.json. Used to trigger
#   repository_dispatch events on those repos.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Engine version that was released (e.g. 0.3.0)"
        required: true

jobs:
  fan-out:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read site registry
        id: registry
        run: |
          # Filter to sites that have a source.repo configured (i.e. on GitHub)
          jq -c '[.[] | select(.source.repo != null)]' .shipwreck/sites.json > registered.json
          echo "count=$(jq 'length' registered.json)" >> "$GITHUB_OUTPUT"

      - name: Dispatch to each site
        env:
          PAT: ${{ secrets.SHIPWRECK_DISPATCH_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::SHIPWRECK_DISPATCH_PAT secret is not set."
            exit 1
          fi
          jq -c '.[]' registered.json | while read -r site; do
            name=$(echo "$site" | jq -r '.name')
            repo=$(echo "$site" | jq -r '.source.repo')
            echo "→ Dispatching engine-update to $repo (site=$name, version=$VERSION)"
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$repo/dispatches" \
              -d "{\"event_type\":\"shipwreck-engine-update\",\"client_payload\":{\"engine_version\":\"$VERSION\",\"site\":\"$name\"}}"
          done
